name: Build & Publish

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Non-main branches: quick Linux-only sanity build, no artifacts
  # ──────────────────────────────────────────────────────────────────────
  test:
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libudev-dev

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          sccache: true

  # ──────────────────────────────────────────────────────────────────────
  # main & tags: full cross-platform wheel builds
  # ──────────────────────────────────────────────────────────────────────
  wheels:
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux glibc (manylinux) ──
          - { os: ubuntu-latest,      target: x86_64-unknown-linux-gnu,  manylinux: manylinux_2_34 }
          - { os: ubuntu-24.04-arm,   target: aarch64-unknown-linux-gnu, manylinux: manylinux_2_34 }
          # ── macOS ──
          - { os: macos-15-intel, target: x86_64-apple-darwin }
          - { os: macos-15,       target: aarch64-apple-darwin }
          # ── Windows ──
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-11-arm, target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up Python interpreters for macOS / Windows native builds.
      # Linux builds run inside manylinux containers which ship their own.
      - uses: actions/setup-python@v5
        if: runner.os != 'Linux' && matrix.target != 'aarch64-pc-windows-msvc'
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      # ARM64 Windows Python only exists from 3.11+
      - uses: actions/setup-python@v5
        if: matrix.target == 'aarch64-pc-windows-msvc'
        with:
          python-version: |
            3.11
            3.12
            3.13

      # macOS needs libusb for the rusb crate
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: true
          manylinux: ${{ matrix.manylinux || 'auto' }}
          # Inside manylinux/musllinux containers, install native libs before
          # the Rust build starts.
          before-script-linux: |
            if command -v apk &>/dev/null; then
              apk add --no-cache libusb-dev eudev-dev linux-headers pkgconf
            elif command -v yum &>/dev/null; then
              yum install -y libusb1-devel systemd-devel pkgconfig
            elif command -v apt-get &>/dev/null; then
              apt-get update && apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config
            fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/

  # ──────────────────────────────────────────────────────────────────────
  # Source distribution
  # ──────────────────────────────────────────────────────────────────────
  sdist:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ──────────────────────────────────────────────────────────────────────
  # Publish to PyPI + GitHub Release (semver tags only)
  # ──────────────────────────────────────────────────────────────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publishing
      contents: write   # GitHub release uploads
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
